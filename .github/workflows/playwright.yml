name: Playwright Tests & Allure Report

on:
  push:
    branches:
      - "**"

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        shard_index: [1, 2, 3]

    env:
      CI: true

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        run: npm run test:ci -- --shard=${{ matrix.shard_index }}/3
        continue-on-error: true

      - name: Upload Allure Raw Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-shard-${{ matrix.shard_index }}
          path: allure-results
          if-no-files-found: warn
          retention-days: 14

  report:
    name: Generate & Deploy Allure Report
    needs: test
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Allure Commandline
        run: npm install -g allure-commandline --save-dev

      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-shard-*
          merge-multiple: true
          path: allure-results

      - name: Verify Allure Results
        run: ls -la allure-results

      - name: Generate Allure Report
        run: allure generate allure-results --clean -o allure-report

      - name: Verify Allure Report
        run: ls -la allure-report

      - name: Upload Allure HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: warn
          retention-days: 14

      - name: Deploy Allure Report to GitHub Pages
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./allure-report
          force_orphan: true